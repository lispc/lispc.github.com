# --- Site settings ---
title: Zhuo Zhang
tagline: notes on code, crypto and other things
description: >-
  Personal blog of Zhuo Zhang — writing about programming, Haskell,
  cryptography, zero-knowledge proofs and building things.
author:
  name: Zhuo Zhang
  email: mycinbrin@gmail.com

# Full base URL of the site (used by SEO tags, feed, sitemap).
url: "https://lispc.github.io"
baseurl: ""

# --- Build settings ---
theme: minima
markdown: kramdown
highlighter: rouge

# Keep existing post URLs unchanged (categories are empty in practice).
permalink: /:categories/:year/:month/:day/:title

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Theme (Minima) settings ---
minima:
  skin: classic
  date_format: "%Y-%m-%d"
  social_links:
    github: lispc
    twitter: lispczz

# Pages shown in the top navigation.
header_pages:
  - about.md
  - archive.html

exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - vendor
  - .github
  - .jekyll-cache
